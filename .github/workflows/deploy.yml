# GitHub Actions Workflow: Deploy to GitHub Pages
# This workflow automates the build and deployment process of the React application to GitHub Pages.
# It triggers on pushes to the 'main' branch or manual dispatch.

name: Deploy to GitHub Pages

on:
  # Runs when PR is created/updated against main
  pull_request:
    branches:
      - main

  # Runs after merge/push to main
  push:
    branches:
      - main

  # Manual trigger support
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple deployments fighting each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # =========================
  # BUILD JOB
  # Runs on BOTH PR and push
  # =========================
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build
        env:
          API_KEY: ${{ secrets.API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # =========================
  # DEPLOY JOB
  # ONLY runs on push to main
  # =========================
  deploy:
    name: Deploy to GitHub Pages

    # Only deploy after successful build
    needs: build

    # IMPORTANT:
    # Skip deployment for PRs
    if: github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy Site
        id: deployment
        uses: actions/deploy-pages@v4
